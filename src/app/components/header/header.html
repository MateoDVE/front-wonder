<header class="header">
  <div class="header__container">
    <!-- Left: logo + nav -->
    <div class="header__left">
      <a class="header__logo" href="/" aria-label="Wonder home">
        <img class="header__logo-icon" src="/Image (Wonder Logo).png" alt="Wonder logo" aria-hidden="true" />
        <span class="header__logo-text">Wonder</span>
      </a>
      <nav class="header__nav" aria-label="Main navigation">
        <a class="header__nav-link" href="/">Catalog</a>
        @if (isAdmin()) {
          <a class="header__nav-link" href="/admin">Admin</a>
        }
      </nav>
    </div>

    <!-- Right: actions -->
    <div class="header__right">
      <button
        class="header__icon-btn"
        (click)="theme.toggle()"
        [attr.aria-label]="theme.isDark() ? 'Modo claro' : 'Modo oscuro'"
        type="button"
      >
        @if (theme.isDark()) {
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="5"/>
            <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
        } @else {
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        }
      </button>

      <button
        class="header__cart-btn"
        (click)="cart.open()"
        aria-label="Abrir carrito"
        type="button"
      >
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
          <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
        </svg>
        @if (cart.itemCount() > 0) {
          <span class="header__cart-badge" aria-label="{{ cart.itemCount() }} items">
            {{ cart.itemCount() }}
          </span>
        }
      </button>

      @if (!currentUser) {
        <button class="header__login-btn" type="button" (click)="openLogin()">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
            <polyline points="10 17 15 12 10 7"/>
            <line x1="15" y1="12" x2="3" y2="12"/>
          </svg>
          Login
        </button>
      } @else {
        <span class="header__user-pill">
          {{ currentUser.nombre }}
          <small>{{ currentUser.rol }}</small>
        </span>
        <button class="header__icon-btn" type="button" (click)="logout()" aria-label="Cerrar sesión">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
        </button>
      }
    </div>
  </div>
</header>

@if (showLoginModal) {
  <app-login-modal
    (closeModal)="closeLogin()"
    (loginSuccess)="onLoginSuccess($event)"
  />
}
