<article class="product-card">
  <div class="product-card__img-wrap">
    @if (!imgError && cleanedImageUrl) {
      <img
        class="product-card__img"
        [src]="cleanedImageUrl"
        [alt]="product.nombre"
        (error)="onImgError()"
        loading="lazy"
      />
    } @else {
      <div class="product-card__img-fallback" aria-hidden="true">
        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8"/><path d="M12 17v4"/>
        </svg>
        <span>{{ product.nombre }}</span>
      </div>
    }
    <span class="product-card__badge">{{ categoryLabel }}</span>
  </div>

  <div class="product-card__body">
    <div class="product-card__info">
      <h3 class="product-card__name">{{ product.nombre }}</h3>
      @if (product.marca) {
        <p class="product-card__brand">{{ product.marca }}</p>
      }
    </div>

    <div class="product-card__meta">
      <span class="product-card__price">{{ product.precio_venta | currency:undefined:'Bs. ' }}</span>
      <span class="product-card__stock" [class.product-card__stock--out]="!inStock">
        {{ product.stock }} disponibles
      </span>
    </div>

    <button
      class="product-card__add-btn"
      (click)="onAddToCart()"
      [disabled]="!inStock"
      type="button"
    >
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
        <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
      </svg>
      {{ inStock ? 'Agregar al Carrito' : 'Agotado' }}
    </button>
  </div>
</article>
